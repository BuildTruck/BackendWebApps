events {
    worker_connections 1024;
}

http {
    proxy_connect_timeout       60s;
    proxy_send_timeout          60s;
    proxy_read_timeout          60s;
    client_max_body_size        10M;

    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name buildtruck-api.duckdns.org;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name buildtruck-api.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/buildtruck-api.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/buildtruck-api.duckdns.org/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ===== USER SERVICE (Auth + Users) =====
        location /api/v1/auth/ {
            proxy_pass http://buildtruck-user-service:8080;
        }

        location /api/v1/users/ {
            proxy_pass http://buildtruck-user-service:8080;
        }

        # ===== PROJECT SERVICE =====
        location /api/v1/projects/ {
            proxy_pass http://buildtruck-project-service:8080;
        }

        # ===== MAIN BACKEND (todos los demás módulos) =====
        location / {
            proxy_pass http://buildtruck-backend:8080;
        }
    }
}
