events {
    worker_connections 1024;
}

http {
    proxy_connect_timeout       60s;
    proxy_send_timeout          60s;
    proxy_read_timeout          60s;
    client_max_body_size        10M;

    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    # Redirect HTTP → HTTPS
    server {
        listen 80;
        server_name buildtruck-api.duckdns.org;
        return 301 https://$host$request_uri;
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name buildtruck-api.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/buildtruck-api.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/buildtruck-api.duckdns.org/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # ===== HEALTH CHECKS (exact match — higher priority than prefix routes) =====
        location = /api/v1/users/health {
            proxy_pass http://buildtruck-user-service:8080/health;
        }
        location = /api/v1/projects/health {
            proxy_pass http://buildtruck-project-service:8080/health;
        }
        location = /api/v1/documentation/health {
            proxy_pass http://buildtruck-documentation-service:8080/health;
        }
        location = /api/v1/incidents/health {
            proxy_pass http://buildtruck-incident-service:8080/health;
        }
        location = /api/v1/machinery/health {
            proxy_pass http://buildtruck-machinery-service:8080/health;
        }
        location = /api/v1/personnel/health {
            proxy_pass http://buildtruck-personnel-service:8080/health;
        }
        location = /api/v1/materials/health {
            proxy_pass http://buildtruck-materials-service:8080/health;
        }
        location = /api/v1/configuration-settings/health {
            proxy_pass http://buildtruck-configuration-service:8080/health;
        }
        location = /api/v1/stats/health {
            proxy_pass http://buildtruck-stats-service:8080/health;
        }
        location = /api/v1/notifications/health {
            proxy_pass http://buildtruck-notification-service:8080/health;
        }

        # ===== USER SERVICE (Auth + Users) =====
        location /api/v1/auth/ {
            proxy_pass http://buildtruck-user-service:8080;
        }

        location /api/v1/users {
            proxy_pass http://buildtruck-user-service:8080;
        }

        location /user-service/swagger {
            proxy_pass http://buildtruck-user-service:8080/swagger;
        }

        # ===== PROJECT SERVICE =====
        location /api/v1/projects/ {
            proxy_pass http://buildtruck-project-service:8080;
        }

        location /project-service/swagger {
            proxy_pass http://buildtruck-project-service:8080/swagger;
        }

        # ===== DOCUMENTATION SERVICE =====
        location /api/v1/documentation/ {
            proxy_pass http://buildtruck-documentation-service:8080;
        }

        location /documentation-service/swagger {
            proxy_pass http://buildtruck-documentation-service:8080/swagger;
        }

        # ===== INCIDENTS SERVICE =====
        location /api/v1/incidents/ {
            proxy_pass http://buildtruck-incident-service:8080;
        }

        location /incident-service/swagger {
            proxy_pass http://buildtruck-incident-service:8080/swagger;
        }

        # ===== MACHINERY SERVICE =====
        location /api/v1/machinery/ {
            proxy_pass http://buildtruck-machinery-service:8080;
        }

        location /machinery-service/swagger {
            proxy_pass http://buildtruck-machinery-service:8080/swagger;
        }

        # ===== PERSONNEL SERVICE =====
        location /api/v1/personnel {
            proxy_pass http://buildtruck-personnel-service:8080;
        }

        location /personnel-service/swagger {
            proxy_pass http://buildtruck-personnel-service:8080/swagger;
        }

        # ===== MATERIALS SERVICE =====
        location /api/v1/materials {
            proxy_pass http://buildtruck-materials-service:8080;
        }

        location /api/v1/material-entries {
            proxy_pass http://buildtruck-materials-service:8080;
        }

        location /api/v1/material-usages {
            proxy_pass http://buildtruck-materials-service:8080;
        }

        location /materials-service/swagger {
            proxy_pass http://buildtruck-materials-service:8080/swagger;
        }

        # ===== CONFIGURATIONS SERVICE =====
        location /api/v1/configuration-settings {
            proxy_pass http://buildtruck-configuration-service:8080;
        }

        location /configuration-service/swagger {
            proxy_pass http://buildtruck-configuration-service:8080/swagger;
        }

        # ===== STATS SERVICE =====
        location /api/v1/stats/ {
            proxy_pass http://buildtruck-stats-service:8080;
        }

        location /stats-service/swagger {
            proxy_pass http://buildtruck-stats-service:8080/swagger;
        }

        # ===== NOTIFICATION SERVICE =====
        location /api/v1/notifications {
            proxy_pass http://buildtruck-notification-service:8080;
        }

        location /api/v1/notification-preferences {
            proxy_pass http://buildtruck-notification-service:8080;
        }

        location /hubs/notifications {
            proxy_pass http://buildtruck-notification-service:8080;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        location /notification-service/swagger {
            proxy_pass http://buildtruck-notification-service:8080/swagger;
        }
    }
}
