events {
    worker_connections 1024;
}

http {
    # Timeouts para requests largos (uploads, exports)
    proxy_connect_timeout       60s;
    proxy_send_timeout          60s;
    proxy_read_timeout          60s;

    # Tamaño máximo de body (para uploads de imágenes)
    client_max_body_size        10M;

    # Pasar headers reales del cliente
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;

    server {
        listen 80;

        # ===== USER SERVICE (Auth + Users) =====
        location /api/v1/auth/ {
            proxy_pass http://buildtruck-user-service:8080;
        }

        location /api/v1/users/ {
            proxy_pass http://buildtruck-user-service:8080;
        }

        # ===== USER SERVICE SWAGGER =====
        location /user-service/swagger {
            proxy_pass http://buildtruck-user-service:8080/swagger;
        }

        # ===== MAIN BACKEND (todos los demás módulos) =====
        location / {
            proxy_pass http://buildtruck-backend:8080;
        }
    }
}
