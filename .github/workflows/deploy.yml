name: Deploy to AWS EC2

on:
  push:
    branches: [main]

jobs:
  # ── Build images in CI (7 GB RAM) and push to Docker Hub ──
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: user-service
            dockerfile: BuildTruckUserService/Dockerfile
          - name: project-service
            dockerfile: BuildTruckProjectService/Dockerfile
          - name: documentation-service
            dockerfile: BuildTruckDocumentationService/Dockerfile
          - name: incident-service
            dockerfile: BuildTruckIncidentService/Dockerfile
          - name: machinery-service
            dockerfile: BuildTruckMachineryService/Dockerfile
          - name: materials-service
            dockerfile: BuildTruckMaterialsService/Dockerfile
          - name: personnel-service
            dockerfile: BuildTruckPersonnelService/Dockerfile
          - name: configuration-service
            dockerfile: BuildTruckConfigurationService/Dockerfile
          - name: notification-service
            dockerfile: BuildTruckNotificationService/Dockerfile
          - name: stats-service
            dockerfile: BuildTruckStatsService/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/buildtruck-${{ matrix.name }}:latest
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  # ── Pull pre-built images on EC2 and restart ──
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 10m
          script: |
            echo "=========================================="
            echo "Starting BuildTruck Deploy"
            echo "$(date)"
            echo "=========================================="

            # ── 0. Swap (one-time setup, safe to re-run) ──
            if [ ! -f /swapfile ]; then
              echo "[0/5] Creating 2 GB swap file..."
              sudo fallocate -l 2G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
              echo '/swapfile none swap sw 0 0' | sudo tee -a /etc/fstab
              echo "Swap created"
            fi

            # ── 1. Pull latest code ──
            echo ""
            echo "[1/5] Pulling latest code from main..."
            cd /home/ec2-user/buildtruck/BackendWebApps
            git pull origin main

            # ── 2. Generate .env ──
            echo ""
            echo "[2/5] Generating .env..."
            printf '%s\n' \
              'JWT_SECRET_KEY=${{ secrets.JWT_SECRET }}' \
              'JWT_ISSUER=BuildTruckBack' \
              'JWT_AUDIENCE=BuildTruckBack-Users' \
              'TokenSettings__SecretKey=${{ secrets.JWT_SECRET }}' \
              'MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}' \
              'SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}' \
              'EmailSettings__SmtpPassword=${{ secrets.SMTP_PASSWORD }}' \
              'CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_SECRET }}' \
              'CloudinarySettings__ApiSecret=${{ secrets.CLOUDINARY_SECRET }}' \
              'IMAGE_PREFIX=${{ secrets.DOCKERHUB_USERNAME }}' \
              > .env
            echo ".env generated"

            # ── 3. Stop running containers ──
            echo ""
            echo "[3/5] Stopping containers..."
            docker compose down --remove-orphans 2>/dev/null || true

            # ── 4. Pull pre-built images and start ──
            echo ""
            echo "[4/5] Pulling images from Docker Hub..."
            docker compose pull

            echo "Starting containers..."
            docker compose up -d

            # ── 5. Cleanup ──
            echo ""
            echo "[5/5] Cleaning unused images..."
            docker image prune -f

            echo ""
            echo "=========================================="
            echo "Container status:"
            docker compose ps
            echo "=========================================="
            echo "Deploy completed!"
            echo "API: http://${{ secrets.EC2_HOST }}"
            echo "=========================================="
