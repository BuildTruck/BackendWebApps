name: Deploy to AWS EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "=========================================="
            echo "🚀 Starting BuildTruck Deploy"
            echo "📅 $(date)"
            echo "=========================================="

            # ── 1. Pull latest code ──────────────────────
            echo ""
            echo "📥 [1/5] Pulling latest code from main..."
            cd /home/ec2-user/buildtruck/BackendWebApps
            git pull origin main
            echo "✅ Code updated successfully"

            # ── 2. Generate .env ─────────────────────────
            echo ""
            echo "🔐 [2/5] Generating .env from secrets..."
            cat > .env << 'EOF'
            JWT_SECRET_KEY=${{ secrets.JWT_SECRET }}
            JWT_ISSUER=BuildTruckBack
            JWT_AUDIENCE=BuildTruckBack-Users
            TokenSettings__SecretKey=${{ secrets.JWT_SECRET }}
            MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}
            SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}
            EmailSettings__SmtpPassword=${{ secrets.SMTP_PASSWORD }}
            CLOUDINARY_API_SECRET=${{ secrets.CLOUDINARY_SECRET }}
            CloudinarySettings__ApiSecret=${{ secrets.CLOUDINARY_SECRET }}
            UserService__BaseUrl=http://buildtruck-user-service:8080
            ProjectService__BaseUrl=http://buildtruck-project-service:8080
            EOF
            echo "✅ .env generated"

            # ── 3. Stop running containers ───────────────
            echo ""
            echo "🛑 [3/5] Stopping running containers..."
            docker compose down
            echo "✅ Containers stopped"

            # ── 4. Build and start containers ────────────
            echo ""
            echo "🔨 [4/5] Building and starting containers..."
            docker compose up -d --build 2>&1 | tee /tmp/compose-up.log
            if grep -q "ERROR\|exit code" /tmp/compose-up.log; then
              echo "❌ Build failed! Check logs above."
              exit 1
            fi
            echo "✅ Containers started"

            # ── 5. Cleanup ────────────────────────────────
            echo ""
            echo "🧹 [5/5] Cleaning up unused Docker resources..."
            docker system prune -f
            echo "✅ Cleanup done"

            # ── Summary ───────────────────────────────────
            echo ""
            echo "=========================================="
            echo "📊 Container status:"
            docker compose ps
            echo "=========================================="
            echo "✅ Deploy completed successfully!"
            echo "🌐 API available at: http://${{ secrets.EC2_HOST }}"
            echo "=========================================="
