version: '3.8'

services:
  # ===== NGINX REVERSE PROXY =====
  nginx:
    image: nginx:alpine
    container_name: buildtruck-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - buildtruck-user-service
      - buildtruck-backend
      - buildtruck-project-service
      - buildtruck-documentation-service
      - buildtruck-incident-service
      - buildtruck-machinery-service
      - buildtruck-configuration-service
    networks:
      - buildtruck-network
    restart: always

  # ===== PROJECTS MICROSERVICE =====
  buildtruck-project-service:
    build:
      context: .
      dockerfile: BuildTruckProjectService/Dockerfile
    container_name: buildtruck-project-service
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
      buildtruck-user-service:
        condition: service_started
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=server=mysql;port=3306;database=buildtruck;user=root;password=${MYSQL_PASSWORD}
      - TokenSettings__SecretKey=${JWT_SECRET_KEY}
      - TokenSettings__Issuer=${JWT_ISSUER}
      - TokenSettings__Audience=${JWT_AUDIENCE}
      - CloudinarySettings__ApiSecret=${CLOUDINARY_API_SECRET}
      - UserService__BaseUrl=http://buildtruck-user-service:8080
    networks:
      - buildtruck-network
    restart: always

  # ===== DOCUMENTATION MICROSERVICE =====
  buildtruck-documentation-service:
    build:
      context: .
      dockerfile: BuildTruckDocumentationService/Dockerfile
    container_name: buildtruck-documentation-service
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
      buildtruck-user-service:
        condition: service_started
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=server=mysql;port=3306;database=buildtruck;user=root;password=${MYSQL_PASSWORD}
      - TokenSettings__SecretKey=${JWT_SECRET_KEY}
      - TokenSettings__Issuer=${JWT_ISSUER}
      - TokenSettings__Audience=${JWT_AUDIENCE}
      - CloudinarySettings__ApiSecret=${CLOUDINARY_API_SECRET}
      - UserService__BaseUrl=http://buildtruck-user-service:8080
    networks:
      - buildtruck-network
    restart: always

  # ===== INCIDENTS MICROSERVICE =====
  buildtruck-incident-service:
    build:
      context: .
      dockerfile: BuildTruckIncidentService/Dockerfile
    container_name: buildtruck-incident-service
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
      buildtruck-user-service:
        condition: service_started
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=server=mysql;port=3306;database=buildtruck;user=root;password=${MYSQL_PASSWORD}
      - TokenSettings__SecretKey=${JWT_SECRET_KEY}
      - TokenSettings__Issuer=${JWT_ISSUER}
      - TokenSettings__Audience=${JWT_AUDIENCE}
      - CloudinarySettings__ApiSecret=${CLOUDINARY_API_SECRET}
      - UserService__BaseUrl=http://buildtruck-user-service:8080
    networks:
      - buildtruck-network
    restart: always

  # ===== MACHINERY MICROSERVICE =====
  buildtruck-machinery-service:
    build:
      context: .
      dockerfile: BuildTruckMachineryService/Dockerfile
    container_name: buildtruck-machinery-service
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
      buildtruck-user-service:
        condition: service_started
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=server=mysql;port=3306;database=buildtruck;user=root;password=${MYSQL_PASSWORD}
      - TokenSettings__SecretKey=${JWT_SECRET_KEY}
      - TokenSettings__Issuer=${JWT_ISSUER}
      - TokenSettings__Audience=${JWT_AUDIENCE}
      - CloudinarySettings__ApiSecret=${CLOUDINARY_API_SECRET}
      - UserService__BaseUrl=http://buildtruck-user-service:8080
    networks:
      - buildtruck-network
    restart: always

  # ===== CONFIGURATIONS MICROSERVICE =====
  buildtruck-configuration-service:
    build:
      context: .
      dockerfile: BuildTruckConfigurationService/Dockerfile
    container_name: buildtruck-configuration-service
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
      buildtruck-user-service:
        condition: service_started
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=server=mysql;port=3306;database=buildtruck;user=root;password=${MYSQL_PASSWORD}
      - TokenSettings__SecretKey=${JWT_SECRET_KEY}
      - TokenSettings__Issuer=${JWT_ISSUER}
      - TokenSettings__Audience=${JWT_AUDIENCE}
    networks:
      - buildtruck-network
    restart: always

  # ===== AUTH + USERS MICROSERVICE =====
  buildtruck-user-service:
    build:
      context: .
      dockerfile: BuildTruckUserService/Dockerfile
    container_name: buildtruck-user-service
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=server=mysql;port=3306;database=buildtruck;user=root;password=${MYSQL_PASSWORD}
      - TokenSettings__SecretKey=${JWT_SECRET_KEY}
      - TokenSettings__Issuer=${JWT_ISSUER}
      - TokenSettings__Audience=${JWT_AUDIENCE}
      - EmailSettings__SmtpPassword=${SMTP_PASSWORD}
      - CloudinarySettings__ApiSecret=${CLOUDINARY_API_SECRET}
    networks:
      - buildtruck-network
    restart: always

  # ===== MAIN BACKEND (monolito) =====
  buildtruck-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buildtruck-dotnet
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
      buildtruck-user-service:
        condition: service_started
      buildtruck-project-service:
        condition: service_started
      buildtruck-documentation-service:
        condition: service_started
      buildtruck-incident-service:
        condition: service_started
      buildtruck-configuration-service:
        condition: service_started
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=server=mysql;port=3306;database=buildtruck;user=root;password=${MYSQL_PASSWORD}
      - TokenSettings__SecretKey=${JWT_SECRET_KEY}
      - TokenSettings__Issuer=${JWT_ISSUER}
      - TokenSettings__Audience=${JWT_AUDIENCE}
      - EmailSettings__SmtpPassword=${SMTP_PASSWORD}
      - CloudinarySettings__ApiSecret=${CLOUDINARY_API_SECRET}
      - UserService__BaseUrl=http://buildtruck-user-service:8080
      - ProjectService__BaseUrl=http://buildtruck-project-service:8080
      - DocumentationService__BaseUrl=http://buildtruck-documentation-service:8080
      - IncidentService__BaseUrl=http://buildtruck-incident-service:8080
      - MachineryService__BaseUrl=http://buildtruck-machinery-service:8080
      - ConfigurationService__BaseUrl=http://buildtruck-configuration-service:8080
    networks:
      - buildtruck-network
    restart: always

  # ===== MYSQL =====
  mysql:
    image: mysql:8.0
    container_name: buildtruck-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: buildtruck
      MYSQL_USER: buildtruckuser
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - buildtruck-network
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:

networks:
  buildtruck-network:
    driver: bridge
