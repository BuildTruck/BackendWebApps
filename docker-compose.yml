version: '3.8'

services:
  # Auth + Users Microservice
  buildtruck-user-service:
    build:
      context: .
      dockerfile: BuildTruckUserService/Dockerfile
    container_name: buildtruck-user-service
    ports:
      - "5001:8080"
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=server=mysql;port=3306;database=buildtruck;user=root;password=${MYSQL_PASSWORD}
      - TokenSettings__SecretKey=${JWT_SECRET_KEY}
      - TokenSettings__Issuer=${JWT_ISSUER}
      - TokenSettings__Audience=${JWT_AUDIENCE}
      - EmailSettings__SmtpPassword=${SMTP_PASSWORD}
      - CloudinarySettings__ApiSecret=${CLOUDINARY_API_SECRET}
    networks:
      - buildtruck-network
    restart: always

  # Main Backend (monolith - all modules except Auth/Users)
  buildtruck-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: buildtruck-dotnet
    ports:
      - "5000:8080"
    depends_on:
      mysql:
        condition: service_healthy
      buildtruck-user-service:
        condition: service_started
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=server=mysql;port=3306;database=buildtruck;user=root;password=${MYSQL_PASSWORD}
      - TokenSettings__SecretKey=${JWT_SECRET_KEY}
      - TokenSettings__Issuer=${JWT_ISSUER}
      - TokenSettings__Audience=${JWT_AUDIENCE}
      - EmailSettings__SmtpPassword=${SMTP_PASSWORD}
      - CloudinarySettings__ApiSecret=${CLOUDINARY_API_SECRET}
      - UserService__BaseUrl=http://buildtruck-user-service:8080
    networks:
      - buildtruck-network
    restart: always

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: buildtruck-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: buildtruck
      MYSQL_USER: buildtruckuser
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - buildtruck-network
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:

networks:
  buildtruck-network:
    driver: bridge
